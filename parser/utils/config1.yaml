ec2:
  - name: myinstance
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    security_group : "sec-group-1"

asg:
  - name: myasg
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    max: 3
    min: 1 
    

alb:
  - name: myalb
    vpc : 'main-v'
    asg: myasg


dynamodb:
  name: MyDynamoDBStack
  table_name: MyDynamoDBTable
  partition_key: id
  sort_key:
    name: created_at
    type: STRING
  read_capacity: 5
  write_capacity: 5
  grant_permissions_to_ec2: true  # YAML uses lowercase "true" for booleans

  

          
