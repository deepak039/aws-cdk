vpcs:
 - name : "main-v"
   cidr: "10.0.0.0/16"
   max_azs: 2
   subnets:
    - name: "public"
      type: "PUBLIC"
      cidr_mask: 24
    - name: "private"
      type: "PRIVATE_WITH_EGRESS"
      cidr_mask: 24
security_groups:
  - name: "sec-group-1"
    description: "Default VPC security group"
    service : "main-v"
    allow_all_outbound: true
    ingress_rules:
      - cidr: "10.0.0.0/16"
        description: "Allow all traffic within VPC"
        port: "ALL_TRAFFIC"
ec2:
  - name: myinstance
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    security_group : "sec-group-1"

asg:
  - name: myasg
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    max: 3
    min: 1 
    

alb:
  - name: myalb
    vpc : 'main-v'
    asg: myasg

dynamodb:
  - name: "TestTable"
    partition_key:
      name: "pk"
      type: "string"
    sort_key:
      name: "sk"
      type: "string"
    billing_mode: "PAY_PER_REQUEST"
    enable_point_in_time_recovery: true

  

          
