rds:
  - instance_type: "t3.micro"     
    allocated_storage: 20          # Storage in GB
    multi_az: true                 # Enable multi-AZ deployment
    deletion_protection: false
    publicly_accessible: false
    storage_encrypted: true
    backup_retention_days: 7       # Backup retention duration in days
    removal_policy: "DESTROY"      # Options: DESTROY, SNAPSHOT, RETAIN
    cloudwatch_logs_exports:
      - "error"
      - "general"
      - "slowquery"
dynamodb:
  - partition_key:
      name: "pk"
      type: "string"
    sort_key:
      name: "sk"
      type: "string"
    billing_mode: "PAY_PER_REQUEST"
    enable_point_in_time_recovery: true 

lambdas:
  - runtime: "nodejs_18" 
    file_type: 'zip'
    code: "lambda1"
    handler: "index.handler"
    memory_size: 128
    timeout: 10                     # Timeout in seconds


api_gateways:
  - cors_enabled: true
    authorization: "NONE"          # Options: NONE, LAMBDA, IAM

vpcs:
  - cidr: "10.0.0.0/16"
    max_azs: 1
    subnets:
      - name: "public"
        type: "PUBLIC"
        cidr_mask: 24
      - name: "private"
        type: "PRIVATE_WITH_EGRESS"
        cidr_mask: 24

security_groups:
  - description: "Default VPC security group"
    allow_all_outbound: true

eks:
  - version: "1.27"
    instance_type: "t3.medium"
    default_capacity: 2
    