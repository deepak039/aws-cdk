vpcs:
  - name: "main-vpc"
    cidr: "10.0.0.0/16"
    max_azs: 2
    subnets:
      - name: "public"
        type: "PUBLIC"
        cidr_mask: 24
      - name: "private"
        type: "PRIVATE_WITH_EGRESS"
        cidr_mask: 24
      - name: "private-isolated"
        type: "PRIVATE_ISOLATED"
        cidr_mask: 24  

security_groups:
  - name: "sec-group-1"
    description: "Default VPC security group"
    service: "main-vpc"
    allow_all_outbound: true
    ingress_rules:
      - cidr: "10.0.0.0/16"
        description: "Allow all traffic within VPC"
        port: "ALL_TRAFFIC"
      - cidr: "0.0.0.0/0"
        description: "Allow all traffic from internet"
        protocol: "TCP"
        port: 80
        

vpc_endpoints:
  - service: dynamodb
    name: "TestEndpoint"
    vpc: "main-vpc"
    subnets:
      - "PRIVATE_WITH_EGRESS"

lambdas:
  - name: lambda1
    file_type: 'zip'
    code: "lambda1"
    vpc: 'main-vpc'
    security_group: "sec-group-1"
    handler: "handler.handler"
    runtime: "python_3_8"

api_gateways:
  - name: apigateway1
    lambdaname: lambda1
    key : "HelloWorld"
    routes:
      - path: "/route1"
        method: "GET"


rds:
  - name: "TestRDSInstance"
    vpc: "main-vpc"
    security_group: "sec-group-1"
    engine: "maria_db"          # mysql, postgres, maria_db, oracle-se2
    database_name: "testdb"
    master_username: "admin"
    master_password: "password123"

s3_buckets:
  - name: "MyS3Bucket"
    bucket_name: my-configured-s3-bucket
    versioned: true
    bucket_key_enabled: true
    access_control: PRIVATE
    retain_on_delete: true

    lifecycle:
      noncurrent_version_expiration_days: 30  
    bucket_policy:
      actions:
        - s3:GetObject
        - s3:PutObject
        - s3:DeleteObject

    
asg:
  - name: myasg
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    max: 3
    min: 1 

alb:
  - name: myalb
    vpc : 'main-v'
    asg: myasg


ec2:
  name: my-ec2-instance                    # Required: Name for the EC2 instance
  instance_type: t2.micro                  # Optional: EC2 instance type (default: t2.micro)
  volume_size: 20                          # Optional: EBS volume size in GB (default: 8)
  volume_type: gp3    
                                # Optional: EBS volume type (default: gp3)
  iops: 3000                              # Optional: IOPS for io1/io2 volumes
  key_name: my-key-pair                   # Optional: SSH key pair name
  availability_zone: us-east-1a           # Optional: AZ to launch instance in
  termination_protection: false           # Optional: Enable/disable termination protection
  instance_name: my-custom-name           # Optional: Custom name tag for instance
  user_data_path: scripts/startup.sh      # Optional: Path to user data script
  policy:                                 # Optional: List of IAM policies to attach
    - s3_read_only
    - cloudwatch_full_access

eks:
  name: "basic-eks-cluster"
  vpc: "main-vpc"
  admin_roles:
    - arn: arn:aws:iam::533267104533:user/testuser
  node_groups:
    - name: "default-node-group"
      min_size: 1
      max_size: 3
      desired_size: 2   

