vpcs:
 - name : "main-v"
   cidr: "10.0.0.0/16"
   max_azs: 2
security_groups:
  - name: "sec-group-1"
    service : "main-v"
    ingress_rules:
      - cidr: "10.0.0.0/16"
        description: "Allow all traffic within VPC"
        port: "ALL_TRAFFIC"

asg:
  - name: myasg
    vpc : 'main-v'
    user_data_path : 'code-app.sh'
    max: 3
    min: 1 
alb:
  - name: myalb
    vpc : 'main-v'
    asg: myasg

dynamodb:
  - name: "TestTable"

  

          
