vpcs:
  - name: "main-vpc"
    cidr: "10.0.0.0/16"
    max_azs: 2

security_groups:
  - name: "sec-group-1"
    service: "main-vpc"
    ingress_rules:
      - cidr: "10.0.0.0/16"
        description: "Allow all traffic within VPC"
        port: "ALL_TRAFFIC"

lambdas:
  - name: lambda1
    file_type: 'zip'
    code: "lambda1"
    vpc: 'main-vpc'
    security_group: "sec-group-1"


api_gateways:
  - name: apigateway1
    lambdaname: lambda1
    key : "HelloWorld"
    routes:
      - path: "/route1"
        method: "GET"


rds:
  - name: "TestRDSInstance1"
    vpc: "main-vpc"
    security_group: "sec-group-1"
    engine: "mysql"       
    database_name: "testdb"
    master_username: "admin1"
    master_password: "password123"
