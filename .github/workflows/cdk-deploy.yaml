name: Deploy CDK Stack

on:
  workflow_dispatch:
    inputs:
      config-file:
        description: 'Filename of the YAML file for the CDK deployment (e.g., lambda.yaml)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name : Aws Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: AKIAYM7PN4RMP6WXKJ43
        aws-secret-access-key: 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
        aws-region: us-east-1

    # Step 2: Debug repository structure (optional for troubleshooting)
    - name: Debug Repository Structure
      run: |
        echo "Repository Root Files and Folders:"
        ls -la
        echo "Contents of parser/configs directory:"
        ls -la parser/configs

    # Step 3: Set up Python environment
    - name: Set Up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.13.2"

    # Step 4: Install Python dependencies
    - name: Install Python Dependencies
      run: |
        if [ ! -f requirements.txt ]; then
          echo "Error: requirements.txt file not found!"
          exit 1
        fi
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 5: Set up Node.js environment
    - name: Set up Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 18  # Use LTS version

    # Step 6: Install AWS CDK globally
    - name: Install AWS CDK Globally
      run: npm install -g aws-cdk

    # Step 7: Validate filename input and prepend relative path
    - name: Validate and Adjust Config File Path
      run: |
        CONFIG_FILE="parser/configs/${{ github.event.inputs.config-file }}"
        echo "Constructed config file path: $CONFIG_FILE"
        if [ -z "$CONFIG_FILE" ]; then
          echo "Error: Config file input is required!"
          exit 1
        fi
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "Error: Specified config file '$CONFIG_FILE' not found!"
          exit 1
        fi
        echo "Config file '$CONFIG_FILE' found successfully!"
      env:
        CONFIG_FILE: parser/configs/${{ github.event.inputs.config-file }}

    # Step 8: Deploy the CDK stack using the constructed file path
    - name: Deploy AWS CDK Stack
      run: |
        echo "Starting CDK deployment..."
        cdk deploy -c config="${{ github.event.inputs.config-file }}"